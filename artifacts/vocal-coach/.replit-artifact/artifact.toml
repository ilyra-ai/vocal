kind = "web"
previewPath = "/"
title = "VocalCoach AI"
version = "1.0.0"
id = "artifacts/vocal-coach"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25199

[services.development]
run = "pnpm --filter @workspace/vocal-coach run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vocal-coach", "run", "build" ]
publicDir = "artifacts/vocal-coach/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25199"
BASE_PATH = "/"
